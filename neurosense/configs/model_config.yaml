# NeuroSense — Model Architecture Configuration
# PRD Section 4.2: Module Specifications
# All hyperparameters are authoritative from the PRD.

# ─── MRI Encoder (PRD 4.2.2) ───
mri_encoder:
  backbone: "resnet50"
  spatial_dims: 3
  n_input_channels: 1
  # ResNet-50 final layer output dimension
  backbone_out_dim: 2048
  # Projection head: Linear(2048, 256) → ReLU → LayerNorm
  embedding_dim: 256
  pretrained_weights: "med3d"  # Transfer learning from Med3D

  # Data augmentation (PRD 4.2.2)
  augmentation:
    random_flip_prob: 0.5
    random_flip_axes: [0, 1, 2]  # All spatial axes
    random_rotation_range_deg: 15.0  # ±15°
    random_intensity_shift: 0.1  # ±0.1

# ─── Clinical Encoder (PRD 4.2.3) ───
clinical_encoder:
  input_features: 5  # [cag_repeat, uhdrs_motor, uhdrs_cognitive, tfc, age]
  num_layers: 2
  hidden_size: 256
  dropout: 0.3
  bidirectional: true
  # Bi-LSTM output: 2 * hidden_size = 512
  lstm_output_dim: 512
  # Projection: Linear(512, 256)
  embedding_dim: 256

# ─── Cross-Modal Fusion (PRD 4.2.4) ───
fusion:
  embed_dim: 256
  num_heads: 8
  batch_first: true
  # FFN: 256 → 1024 → 256, GELU activation
  ffn_hidden_dim: 1024
  ffn_activation: "gelu"
  # Pre-norm transformer block with residual connections
  pre_norm: true

# ─── Classification Head (PRD 4.2.5) ───
classifier:
  input_dim: 256
  num_classes: 3
  class_names:
    - "pre-manifest"
    - "early"
    - "advanced"

# ─── Progression Head (PRD 4.2.6) ───
progression:
  input_dim: 256
  output_dim: 2  # [12-month delta, 24-month delta]
  # Risk category thresholds (UHDRS motor score change)
  risk_thresholds:
    low_max: 3.0        # Δ < 3 → low risk
    medium_max: 8.0     # 3 ≤ Δ < 8 → medium risk
    # Δ ≥ 8 → high risk

# ─── MRI Input Specifications (PRD 4.2.1) ───
mri_input:
  spatial_size: [48, 48, 48]  # Reduced from 96³ for lower memory usage
  voxel_spacing: [1.0, 1.0, 1.0]  # 1mm isotropic
  normalization: "zscore"  # Z-score per subject
  file_format: "nifti"  # .nii or .nii.gz

# ─── Clinical Feature Ranges (for min-max normalisation) ───
clinical_ranges:
  cag_repeat:
    min: 36.0
    max: 120.0
  uhdrs_motor:
    min: 0.0
    max: 124.0
  uhdrs_cognitive:
    min: 0.0
    max: 300.0  # Composite cognitive score
  tfc:
    min: 0.0
    max: 13.0
  age:
    min: 18.0
    max: 90.0

# ─── HD Staging Thresholds (clinical consensus) ───
staging_thresholds:
  pre_manifest:
    cag_min: 36
    uhdrs_motor_max: 5
    tfc_min: 11
  early:
    uhdrs_motor_min: 6
    uhdrs_motor_max: 30
    tfc_min: 7
    tfc_max: 10
  advanced:
    uhdrs_motor_min: 31
    tfc_max: 6
